<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />
</head>
<body class="">
  <header class="bg-green-500">
        <h1 class="text-center text-4xl p-7 font-bold text-white">My fitness Life - MFL </h1> 
  </header>
<div class="flex justify-center m-10">
<input class="shadow-xl w-xl p-4 rounded-lg" placeholder="Digite as calorias que você gasta">
</div>

  <div class="flex justify-around mt-20 ">
    <div class="p-10 shadow-2xl w-sm rounded-2xl h-40">
        <h1 class="text-3xl">Calorias totais</h1>
        <span class="text-2xl"> X</span><span>/ X kcal</span>
    </div>
    <div class="p-10 shadow-2xl w-sm rounded-2xl ">
        <h1 class="text-3xl">Proteinas totais</h1>
        <span class="text-2xl"> X</span><span>/ Xg</span>
    </div>
    <div class="p-10 shadow-2xl w-sm rounded-2xl ">
        <h1 class="text-3xl">Déficit calórico</h1>
        <span class="text-2xl"> X</span>
    </div>
  </div>

  <h1 class="text-4xl text-center mt-30 font-bold">Progresso diário</h1>
  <div class="flex justify-around my-20">
    
    <div>
        <h1 class="text-2xl font-bold text-center">Calorias consumidas</h1>
        <progress class="progress w-150 h-7 mt-5 text-blue-700" value="75" max="100"></progress>
    </div>

    <div>
        <h1 class="text-2xl font-bold text-center">Proteínas consumidas</h1>
        <progress class="progress w-150 h-7 mt-5 text-blue-700" value="75" max="100"></progress>
    </div>
  </div>

  <h1 class="text-3xl text-center my-5 font-bold">Adicionar alimento</h1>

  <div class="flex justify-around m-5">
  <div>
    <p class="font-bold my-3 text-xl">Nome do alimento</p>
    <input type="text" placeholder="Nome do alimento" class="rounded-md p-2 px-5" id="nomeAlimento">
  </div>

  <div>
    <p class="font-bold my-3 text-xl">Calorias</p>
    <input type="text" placeholder="Calorias do alimento" class="rounded-md p-2 px-5" id="caloriasAlimento">
  </div>

  <div>
    <p class="font-bold my-3 text-xl">Proteína</p>
    <input type="text" placeholder=" Quantidade de proteína" class="rounded-md p-2 px-5" id="proteinasAlimento">
  </div>

  <div>
    <p class="font-bold my-3 text-xl">Carboidratos</p>
    <input type="text" placeholder=" Quantidade de proteína" class="rounded-md p-2 px-5" id="carboidratosAlimento">
  </div>

<div>
    <p class="font-bold my-3 text-xl">Gorduras</p>
    <input type="text" placeholder=" Quantidade de proteína" class="rounded-md p-2 px-5" id="gordurasAlimento">
  </div>

  <div>
    <p class="font-bold my-3 text-xl">Refeição</p>
    <select type="text" placeholder="Tipo de refeição" class="rounded-md p-2 px-5" id="tipoAlimento"> 
        <option value="Café da manhã">Café da manhã</option>
        <option value="Almoço">Almoço</option>
        <option value="Lanche">Lanche</option>
        <option value="Janta">Jantar</option>
    </select>
  </div>

  <button class="bg-green-500 px-5 rounded-2xl font-bold text-white transition duration-300 hover:scale-130 h-10 mt-13 cursor-pointer shadow-xl" id="add">+ Adicionar</button>

  </div>

                            <!-- Cards-->
  <div class="flex justify-around mt-40" id="listaRef">
    
  </div>
  <script src="js/index.js"></script>
    
</body>
</html>
